openapi: 3.1.0
info:
  title: 鲸云AI教育平台 API
  version: 0.1.0
  description: |
    W0-2 契约 · MVP 口径(对应《MVP 裁剪手册》)。统一响应包 {code,message,data};
    分页 {items,total};鉴权 Bearer JWT,payload 含 {uid,orgId,role}。
    角色约束写在各接口 description 的 [角色] 标注中。
servers: [{ url: /api/v1 }]
security: [{ bearer: [] }]

components:
  securitySchemes:
    bearer: { type: http, scheme: bearer, bearerFormat: JWT }
  parameters:
    page: { name: page, in: query, schema: { type: integer, default: 1, minimum: 1 } }
    size: { name: size, in: query, schema: { type: integer, default: 20, maximum: 50 } }
    keyword: { name: keyword, in: query, schema: { type: string } }
    idPath: { name: id, in: path, required: true, schema: { type: integer } }
  responses:
    Err:
      description: 业务/鉴权错误(401 未登录 403 越权 404 不存在或跨租户)
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrResp' } } }
  schemas:
    ErrResp:
      type: object
      required: [code, message]
      properties: { code: { type: integer }, message: { type: string }, detail: {} }
    OkVoid:
      type: object
      required: [code, message, data]
      properties: { code: { type: integer, enum: [0] }, message: { type: string }, data: { type: 'null' } }
    # ---- 枚举 ----
    Role: { type: string, enum: [admin, teacher, student] }
    UserStatus: { type: string, enum: [active, disabled, pending] }
    ClassType: { type: string, enum: [group, one_on_one, one_on_three] }
    LessonStatus: { type: string, enum: [draft, ready, in_progress, finished] }
    SegmentType: { type: string, enum: [warmup, lecture, practice, summary, homework, break_time] }
    ResourceType: { type: string, enum: [ppt, pdf, video, interactive, image] }
    QuestionType: { type: string, enum: [single, multi, blank, solution] }
    QuestionStatus: { type: string, enum: [draft, published, retired] }
    PaperType: { type: string, enum: [homework, exam, practice] }
    AssignmentKind: { type: string, enum: [homework, in_class, correction, wrong_redo, consolidation] }
    AttemptStatus: { type: string, enum: [in_progress, submitted, graded] }
    WrongStatus: { type: string, enum: [open, cleared] }
    GraphType: { type: string, enum: [curriculum_knowledge, problem_solving_ability, problem_solving_strategy] }
    # ---- 实体(与 src/dto.ts 一一对应) ----
    Me:
      type: object
      required: [id, orgId, role, name, orgName, orgSettings]
      properties:
        id: { type: integer }
        orgId: { type: integer }
        role: { $ref: '#/components/schemas/Role' }
        name: { type: string }
        orgName: { type: string }
        orgSettings:
          type: object
          required: [ai, studentHours]
          properties:
            ai:
              type: object
              required: [qaGuideOnly, preGrading]
              properties: { qaGuideOnly: { type: boolean }, preGrading: { type: boolean }, classCompanion: { type: boolean }, diagnosis: { type: boolean } }
            studentHours:
              type: object
              required: [start, end]
              properties: { start: { type: string }, end: { type: string } }
    Teacher:
      type: object
      required: [id, name, teacherNo, phone, stage, subject, status, courseCount, questionCount, resourceCount]
      properties:
        id: { type: integer }
        name: { type: string }
        teacherNo: { type: string }
        phone: { type: string }
        stage: { type: string }
        subject: { type: string }
        status: { $ref: '#/components/schemas/UserStatus' }
        courseCount: { type: integer }
        questionCount: { type: integer }
        resourceCount: { type: integer }
    TeacherInput:
      type: object
      required: [name, phone, stage, subject]
      properties:
        name: { type: string, maxLength: 32 }
        phone: { type: string }
        teacherNo: { type: string, description: 不传则自动生成 }
        stage: { type: string }
        subject: { type: string }
    Student:
      type: object
      required: [id, name, studentNo, parentPhone, grade, status, courses, weekStudySec]
      properties:
        id: { type: integer }
        name: { type: string }
        studentNo: { type: string }
        parentPhone: { type: string }
        grade: { type: string }
        status: { $ref: '#/components/schemas/UserStatus' }
        courses:
          type: array
          items:
            type: object
            required: [id, name, classType]
            properties:
              id: { type: integer }
              name: { type: string }
              classType: { $ref: '#/components/schemas/ClassType' }
        weekStudySec: { type: integer }
    StudentInput:
      type: object
      required: [name, parentPhone, grade]
      properties:
        name: { type: string, maxLength: 32 }
        parentPhone: { type: string }
        studentNo: { type: string }
        grade: { type: string }
        courseIds: { type: array, items: { type: integer } }
    Course:
      type: object
      required: [id, name, classType, subject, stage, teacherId, teacherName, totalLessons, currentLesson, studentCount, status, nextLessonAt, attendanceRate, homeworkRate]
      properties:
        id: { type: integer }
        name: { type: string }
        classType: { $ref: '#/components/schemas/ClassType' }
        subject: { type: string }
        stage: { type: string }
        teacherId: { type: integer }
        teacherName: { type: string }
        totalLessons: { type: integer }
        currentLesson: { type: integer }
        studentCount: { type: integer }
        status: { type: string }
        nextLessonAt: { oneOf: [{ type: 'null' }, { type: string, format: date-time }] }
        attendanceRate: { oneOf: [{ type: 'null' }, { type: number }] }
        homeworkRate: { oneOf: [{ type: 'null' }, { type: number }] }
    CourseInput:
      type: object
      required: [name, classType, subject, stage, teacherId, totalLessons]
      properties:
        name: { type: string }
        classType: { $ref: '#/components/schemas/ClassType' }
        subject: { type: string }
        stage: { type: string }
        teacherId: { type: integer }
        totalLessons: { type: integer, minimum: 1 }
        studentIds: { type: array, items: { type: integer } }
    Lesson:
      type: object
      required: [id, courseId, seq, title, scheduledStart, scheduledEnd, status, prepChecklist, openingConfig]
      properties:
        id: { type: integer }
        courseId: { type: integer }
        seq: { type: integer }
        title: { type: string }
        scheduledStart: { oneOf: [{ type: 'null' }, { type: string, format: date-time }] }
        scheduledEnd: { oneOf: [{ type: 'null' }, { type: string, format: date-time }] }
        status: { $ref: '#/components/schemas/LessonStatus' }
        prepChecklist: { type: object, additionalProperties: { type: boolean } }
        openingConfig: { oneOf: [{ type: 'null' }, { type: object, additionalProperties: true }], description: '开场白配置(可空,读写),如 resourceId/text' }
    Segment:
      type: object
      required: [seq, type, durationMin, config, resourceId, paperId, kpNodeId, unitSeq]
      properties:
        id: { type: integer }
        seq: { type: integer }
        type: { $ref: '#/components/schemas/SegmentType' }
        durationMin: { type: integer }
        config: { type: object, additionalProperties: true }
        resourceId: { oneOf: [{ type: 'null' }, { type: integer }] }
        paperId: { oneOf: [{ type: 'null' }, { type: integer }] }
        kpNodeId: { oneOf: [{ type: 'null' }, { type: integer }], description: 关联知识点节点(可空,写) }
        kpNodeName: { oneOf: [{ type: 'null' }, { type: string }], readOnly: true, description: 知识点名称(只读展示) }
        unitSeq: { oneOf: [{ type: 'null' }, { type: integer }], description: 知识点单元序号(可空,读写);同 unitSeq 且 kpNodeId 相同的环节属同一单元,null=开场白等单元外环节 }
    Resource:
      type: object
      required: [id, type, name, ossKey, size, meta, usedByLessons, kpNodeId, kpNodeName, createdAt]
      properties:
        id: { type: integer }
        type: { $ref: '#/components/schemas/ResourceType' }
        name: { type: string }
        ossKey: { type: string }
        size: { type: integer }
        meta: { type: object, additionalProperties: true }
        usedByLessons:
          type: array
          items:
            type: object
            required: [lessonId, lessonTitle]
            properties: { lessonId: { type: integer }, lessonTitle: { type: string } }
        kpNodeId: { oneOf: [{ type: 'null' }, { type: integer }], description: 归档知识点(只读) }
        kpNodeName: { oneOf: [{ type: 'null' }, { type: string }], description: 知识点名称(只读) }
        createdAt: { type: string, format: date-time }
    KpContentPack:
      type: object
      description: 知识点内容包(可复用)。未维护时 lecture/practice 为 null,summaryConfig 为 {}。
      required: [kpNodeId, kpNodeName, lectureResourceId, lectureResourceName, practicePaperId, practicePaperName, summaryConfig]
      properties:
        kpNodeId: { type: integer }
        kpNodeName: { type: string }
        lectureResourceId: { oneOf: [{ type: 'null' }, { type: integer }] }
        lectureResourceName: { oneOf: [{ type: 'null' }, { type: string }] }
        practicePaperId: { oneOf: [{ type: 'null' }, { type: integer }] }
        practicePaperName: { oneOf: [{ type: 'null' }, { type: string }] }
        summaryConfig: { type: object, additionalProperties: true }
    KpContentPackInput:
      type: object
      description: 内容包 upsert 入参;字段缺省=不改,显式 null=清空。
      properties:
        lectureResourceId: { oneOf: [{ type: 'null' }, { type: integer }] }
        practicePaperId: { oneOf: [{ type: 'null' }, { type: integer }] }
        summaryConfig: { type: object, additionalProperties: true }
    KpGraph:
      type: object
      required: [id, code, graphType, subject, nodeCount]
      properties:
        id: { type: integer }
        code: { type: string }
        graphType: { $ref: '#/components/schemas/GraphType' }
        subject: { type: string }
        nodeCount: { type: integer }
    KpNode:
      type: object
      required: [id, graphId, code, name, parentCode, level, category, grade, chapter, section, difficulty, examWeight, summary, content]
      properties:
        id: { type: integer }
        graphId: { type: integer }
        code: { type: string }
        name: { type: string }
        parentCode: { oneOf: [{ type: 'null' }, { type: string }] }
        level: { oneOf: [{ type: 'null' }, { type: integer }] }
        category: { oneOf: [{ type: 'null' }, { type: string }] }
        grade: { oneOf: [{ type: 'null' }, { type: string }] }
        chapter: { oneOf: [{ type: 'null' }, { type: string }] }
        section: { oneOf: [{ type: 'null' }, { type: string }] }
        difficulty: { oneOf: [{ type: 'null' }, { type: integer }] }
        examWeight: { oneOf: [{ type: 'null' }, { type: number }] }
        summary: { oneOf: [{ type: 'null' }, { type: string }] }
        content: { oneOf: [{ type: 'null' }, { type: string }], description: 教材正文 }
    RubricStep:
      type: object
      required: [step, desc, score]
      properties: { step: { type: integer }, desc: { type: string }, score: { type: number } }
    QuestionFigure:
      type: object
      description: 题目插图(方案A)。anchor 缺省=题干;option/rubric 用 ref 指第几项(选项label/rubric step)。figures 为题目级 Json,无需迁移。
      required: [ossKey, position]
      properties:
        ossKey: { type: string }
        position: { type: integer }
        anchor:
          type: object
          required: [target]
          properties:
            target: { type: string, enum: [stem, option, analysis, reference, rubric] }
            ref: { type: string }
    QuestionOption:
      type: object
      required: [label, contentLatex]
      properties:
        label: { type: string }
        contentLatex: { type: string }
        isCorrect: { type: boolean, description: 学生视图不下发 }
    QuestionTagRef:
      type: object
      required: [nodeId, graphType, code, name]
      properties:
        nodeId: { type: integer }
        graphType: { $ref: '#/components/schemas/GraphType' }
        code: { type: string }
        name: { type: string }
    QuestionAnswer:
      oneOf:
        - { type: object, required: [choice], properties: { choice: { type: string } } }
        - { type: object, required: [choices], properties: { choices: { type: array, items: { type: string } } } }
        - { type: object, required: [texts], properties: { texts: { type: array, items: { type: string } } } }
        - { type: object, required: [referenceLatex], properties: { referenceLatex: { type: string } } }
    Question:
      type: object
      required: [id, type, stage, subject, textbookVersion, chapter, stemLatex, figures, options, answer, rubric, analysisLatex, analysisBriefLatex, analysisDetailLatex, difficulty, status, tags, stats, ownerName, createdAt]
      properties:
        id: { type: integer }
        type: { $ref: '#/components/schemas/QuestionType' }
        stage: { type: string }
        subject: { type: string }
        textbookVersion: { oneOf: [{ type: 'null' }, { type: string }] }
        chapter: { oneOf: [{ type: 'null' }, { type: string }] }
        stemLatex: { type: string }
        figures:
          type: array
          items: { $ref: '#/components/schemas/QuestionFigure' }
        options: { type: array, items: { $ref: '#/components/schemas/QuestionOption' } }
        answer: { oneOf: [{ type: 'null' }, { $ref: '#/components/schemas/QuestionAnswer' }] }
        rubric: { type: array, items: { $ref: '#/components/schemas/RubricStep' } }
        analysisLatex: { oneOf: [{ type: 'null' }, { type: string }], description: 正常解析 }
        analysisBriefLatex: { oneOf: [{ type: 'null' }, { type: string }], description: 简单解析 }
        analysisDetailLatex: { oneOf: [{ type: 'null' }, { type: string }], description: 详细解析 }
        difficulty: { type: integer, minimum: 1, maximum: 3 }
        status: { $ref: '#/components/schemas/QuestionStatus' }
        tags: { type: array, items: { $ref: '#/components/schemas/QuestionTagRef' } }
        stats:
          type: object
          required: [correctRate, usedInPapers]
          properties:
            correctRate: { oneOf: [{ type: 'null' }, { type: number }] }
            usedInPapers: { type: integer }
        ownerName: { type: string }
        createdAt: { type: string, format: date-time }
    QuestionInput:
      type: object
      required: [type, stage, subject, stemLatex, answer]
      properties:
        type: { $ref: '#/components/schemas/QuestionType' }
        stage: { type: string }
        subject: { type: string }
        textbookVersion: { type: string }
        chapter: { type: string }
        stemLatex: { type: string }
        figures: { type: array, items: { $ref: '#/components/schemas/QuestionFigure' } }
        options: { type: array, items: { $ref: '#/components/schemas/QuestionOption' }, description: 选择题必填且 isCorrect 必须恰有规定数量 }
        answer: { $ref: '#/components/schemas/QuestionAnswer' }
        rubric: { type: array, items: { $ref: '#/components/schemas/RubricStep' }, description: 解答题必填,AI 预批依据 }
        analysisLatex: { type: string, description: 正常解析 }
        analysisBriefLatex: { type: string, description: 简单解析 }
        analysisDetailLatex: { type: string, description: 详细解析 }
        difficulty: { type: integer, minimum: 1, maximum: 3 }
        tagNodeIds: { type: array, items: { type: integer }, description: 三维标注,至少 1 个教材知识点 }
    Paper:
      type: object
      required: [id, name, type, totalScore, status, questions]
      properties:
        id: { type: integer }
        name: { type: string }
        type: { $ref: '#/components/schemas/PaperType' }
        totalScore: { type: number }
        status: { type: string }
        questions:
          type: array
          items:
            type: object
            required: [seq, questionId, score, type, stemLatex]
            properties:
              seq: { type: integer }
              questionId: { type: integer }
              score: { type: number }
              type: { $ref: '#/components/schemas/QuestionType' }
              stemLatex: { type: string }
    PaperInput:
      type: object
      required: [name, type, questions]
      properties:
        name: { type: string }
        type: { $ref: '#/components/schemas/PaperType' }
        questions:
          type: array
          minItems: 1
          items:
            type: object
            required: [questionId, score]
            properties: { questionId: { type: integer }, score: { type: number } }
    Assignment:
      type: object
      required: [id, paperId, paperName, lessonId, kind, target, publishAt, dueAt, scoreCounted, questionCount, totalScore]
      properties:
        id: { type: integer }
        paperId: { type: integer }
        paperName: { type: string }
        lessonId: { oneOf: [{ type: 'null' }, { type: integer }] }
        kind: { $ref: '#/components/schemas/AssignmentKind' }
        target:
          type: object
          properties:
            courseId: { type: integer }
            studentIds: { type: array, items: { type: integer } }
        publishAt: { type: string, format: date-time }
        dueAt: { oneOf: [{ type: 'null' }, { type: string, format: date-time }] }
        scoreCounted: { type: boolean }
        questionCount: { type: integer }
        totalScore: { type: number }
    AssignmentBrief:
      type: object
      description: 作业总览项(教师视角)。status 由 finalize 是否完成判定;submitted/totalStudents/graded 为进度概览。
      required: [id, paperName, lessonId, lessonTitle, kind, publishAt, dueAt, submitted, totalStudents, graded, status]
      properties:
        id: { type: integer }
        paperName: { type: string }
        lessonId: { oneOf: [{ type: 'null' }, { type: integer }] }
        lessonTitle: { oneOf: [{ type: 'null' }, { type: string }] }
        kind: { $ref: '#/components/schemas/AssignmentKind' }
        publishAt: { type: string, format: date-time }
        dueAt: { oneOf: [{ type: 'null' }, { type: string, format: date-time }] }
        submitted: { type: integer }
        totalStudents: { type: integer }
        graded: { type: integer }
        status: { type: string, enum: [ongoing, finished] }
    AssignmentInput:
      type: object
      required: [paperId, kind, target]
      properties:
        paperId: { type: integer }
        lessonId: { type: integer }
        kind: { $ref: '#/components/schemas/AssignmentKind' }
        target:
          type: object
          properties:
            courseId: { type: integer }
            studentIds: { type: array, items: { type: integer } }
        dueAt: { type: string, format: date-time }
    AnswerResponseBody:
      oneOf:
        - { type: object, required: [choice], properties: { choice: { type: string } } }
        - { type: object, required: [choices], properties: { choices: { type: array, items: { type: string } } } }
        - { type: object, required: [texts], properties: { texts: { type: array, items: { type: string } } } }
        - { type: object, required: [photoOssKey], properties: { photoOssKey: { type: string } } }
        - { type: object, required: [text], properties: { text: { type: string } } }
    Answer:
      type: object
      required: [questionId, response, isCorrect, score, flagged]
      properties:
        questionId: { type: integer }
        response: { oneOf: [{ type: 'null' }, { $ref: '#/components/schemas/AnswerResponseBody' }] }
        isCorrect: { oneOf: [{ type: 'null' }, { type: boolean }] }
        score: { oneOf: [{ type: 'null' }, { type: number }] }
        flagged: { type: boolean }
        teacherComment: { type: string, description: '教师复核点评(知识点点评),finalize 后返回;仅 attempt 已出分(graded)且教师写了非空点评时下发,否则省略此字段' }
    Attempt:
      type: object
      required: [id, assignmentId, status, attemptNo, startedAt, submittedAt, score, objectiveScore, subjectiveScore, answers, questions]
      properties:
        id: { type: integer }
        assignmentId: { type: integer }
        status: { $ref: '#/components/schemas/AttemptStatus' }
        attemptNo: { type: integer }
        startedAt: { type: string, format: date-time }
        submittedAt: { oneOf: [{ type: 'null' }, { type: string, format: date-time }] }
        score: { oneOf: [{ type: 'null' }, { type: number }] }
        objectiveScore: { oneOf: [{ type: 'null' }, { type: number }] }
        subjectiveScore: { oneOf: [{ type: 'null' }, { type: number }] }
        answers: { type: array, items: { $ref: '#/components/schemas/Answer' } }
        questions: { type: array, items: { $ref: '#/components/schemas/AttemptQuestionView' } }
    AttemptQuestionView:
      type: object
      description: 作答题面(学生端渲染)。correctAnswer/analysisLatex 仅在该题已判定或交卷后下发,in_progress 期间为 null。
      required: [seq, questionId, score, type, stemLatex, figures, options, correctAnswer, analysisLatex]
      properties:
        seq: { type: integer }
        questionId: { type: integer }
        score: { type: number }
        type: { $ref: '#/components/schemas/QuestionType' }
        stemLatex: { type: string }
        figures: { type: array, items: { $ref: '#/components/schemas/QuestionFigure' } }
        options: { type: array, items: { $ref: '#/components/schemas/QuestionOption' } }
        correctAnswer: { oneOf: [{ type: 'null' }, { $ref: '#/components/schemas/QuestionAnswer' }] }
        analysisLatex: { oneOf: [{ type: 'null' }, { type: string }] }
        analysisBriefLatex: { type: string, description: 简单解析(可选,交卷/判定后下发) }
        analysisDetailLatex: { type: string, description: 详细解析(可选,交卷/判定后下发) }
    GradingAnswerBrief:
      type: object
      required: [answerId, studentId, studentName, questionId, seq, status, aiScore, finalScore]
      properties:
        answerId: { type: integer }
        studentId: { type: integer }
        studentName: { type: string }
        questionId: { type: integer }
        seq: { type: integer }
        status: { type: string, enum: [pending, graded] }
        aiScore: { oneOf: [{ type: 'null' }, { type: number }] }
        finalScore: { oneOf: [{ type: 'null' }, { type: number }] }
    SubmitAnswerResult:
      type: object
      required: [judged, isCorrect, correctAnswer, analysisLatex]
      properties:
        judged: { type: boolean, description: 客观题 true 即时判分;主观题 false 入预批队列 }
        isCorrect: { oneOf: [{ type: 'null' }, { type: boolean }] }
        correctAnswer: { oneOf: [{ type: 'null' }, { type: string }] }
        analysisLatex: { oneOf: [{ type: 'null' }, { type: string }], description: 判错后下发解析 }
    GradingItem:
      type: object
      required: [answerId, studentId, studentName, questionId, stemLatex, rubric, photoUrl, textResponse, aiScore, aiSteps, aiErrorTags, finalScore, comment]
      properties:
        answerId: { type: integer }
        studentId: { type: integer }
        studentName: { type: string }
        questionId: { type: integer }
        stemLatex: { type: string }
        rubric: { type: array, items: { $ref: '#/components/schemas/RubricStep' } }
        photoUrl: { oneOf: [{ type: 'null' }, { type: string }], description: 签名URL,短时效 }
        textResponse: { oneOf: [{ type: 'null' }, { type: string }] }
        aiScore: { oneOf: [{ type: 'null' }, { type: number }] }
        aiSteps:
          type: array
          items:
            type: object
            required: [step, ok]
            properties: { step: { type: integer }, ok: { type: boolean }, comment: { type: string } }
        aiErrorTags: { type: array, items: { type: string } }
        finalScore: { oneOf: [{ type: 'null' }, { type: number }] }
        comment: { oneOf: [{ type: 'null' }, { type: string }] }
    WrongBookItem:
      type: object
      required: [id, questionId, type, stemLatex, analysisLatex, wrongCount, correctRedoCount, errorTags, status, sourceName, createdAt, subject]
      properties:
        id: { type: integer }
        questionId: { type: integer }
        type: { $ref: '#/components/schemas/QuestionType' }
        stemLatex: { type: string }
        analysisLatex: { oneOf: [{ type: 'null' }, { type: string }] }
        wrongCount: { type: integer }
        correctRedoCount: { type: integer }
        errorTags: { type: array, items: { type: string } }
        status: { $ref: '#/components/schemas/WrongStatus' }
        sourceName: { type: string }
        createdAt: { type: string, format: date-time }
        subject: { type: string }
        analysisBriefLatex: { type: string, description: 简单解析(可选) }
        analysisDetailLatex: { type: string, description: 详细解析(可选) }
    MasteryItem:
      type: object
      required: [nodeId, nodeName, graphType, mastery, sampleCount]
      properties:
        nodeId: { type: integer }
        nodeName: { type: string }
        graphType: { $ref: '#/components/schemas/GraphType' }
        mastery: { type: integer, minimum: 0, maximum: 100 }
        sampleCount: { type: integer }
    AiUsageSummary:
      type: object
      required: [period, totalTokens, totalCost, monthlyLimit, usedPercent, avgCostPerLesson]
      properties:
        period: { type: string }
        totalTokens: { type: integer }
        totalCost: { type: number }
        monthlyLimit: { type: number }
        usedPercent: { type: number }
        avgCostPerLesson: { oneOf: [{ type: 'null' }, { type: number }] }
    AiUsageBreakdown:
      type: object
      required: [key, label, tokens, cost, percent]
      properties:
        key: { type: string }
        label: { type: string }
        tokens: { type: integer }
        cost: { type: number }
        percent: { type: number }
    # ---- AI 接口管理(admin)· 运行态 LLM 配置;与 src/dto.ts 一一对应 ----
    AiProviderConfig:
      type: object
      required: [baseUrl, model, apiKeyMasked, concurrency, source]
      properties:
        baseUrl: { type: string }
        model: { type: string }
        apiKeyMasked: { type: string, description: 脱敏后的 key,如 sk-****e86f3;未配置则空串(绝不回明文) }
        concurrency: { type: integer, description: 全局并发上限(同时在飞的 LLM 调用数) }
        source: { type: string, enum: [runtime, env], description: 当前生效来源:runtime=Redis 运行态 / env=兜底 }
    AiProviderConfigInput:
      type: object
      required: [baseUrl, model, concurrency]
      properties:
        baseUrl: { type: string }
        model: { type: string }
        apiKey: { type: string, description: 留空=保留现有,不覆盖 }
        concurrency: { type: integer }
    AiFeatureRoutes:
      type: object
      required: [qa, pre_grading, class_companion, diagnosis]
      properties:
        qa: { type: string, enum: [real, mock] }
        pre_grading: { type: string, enum: [real, mock] }
        class_companion: { type: string, enum: [real, mock] }
        diagnosis: { type: string, enum: [real, mock] }
    AiTestResult:
      type: object
      required: [ok, latencyMs, sample, error]
      properties:
        ok: { type: boolean }
        latencyMs: { type: integer }
        sample: { oneOf: [{ type: 'null' }, { type: string }], description: 成功时模型回的一小段文本 }
        error: { oneOf: [{ type: 'null' }, { type: string }], description: 失败原因 }
    StsCredential:
      type: object
      required: [uploadUrl, ossKey, expiresAt]
      properties:
        uploadUrl: { type: string, description: 预签名直传 URL(PUT) }
        ossKey: { type: string }
        expiresAt: { type: string, format: date-time }
    AiDiagnosis:
      type: object
      description: AI 学情诊断结果:整体诊断文字 + 薄弱知识点列表
      required: [summary]
      properties:
        summary: { type: string, description: 整体诊断文字 }
        weakPoints:
          type: array
          description: 薄弱知识点列表
          items:
            type: object
            required: [kpName, reason]
            properties: { kpName: { type: string }, reason: { type: string } }
        generatedAt: { type: string, format: date-time }

paths:
  # ================= 认证 =================
  /auth/login:
    post:
      summary: 账号密码登录 [admin/teacher]
      security: []
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, required: [phone, password], properties: {phone: {type: string}, password: {type: string}}}}}
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {type: object, required: [accessToken, refreshToken, me], properties: {accessToken: {type: string}, refreshToken: {type: string}, me: {$ref: '#/components/schemas/Me'}}}}}}}}
        default: {$ref: '#/components/responses/Err'}
  /auth/student/login:
    post:
      summary: 学生账号密码登录 [公开]
      security: []
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, required: [studentNo, password], properties: {studentNo: {type: string}, password: {type: string}}}}}
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {type: object, required: [accessToken, refreshToken, me], properties: {accessToken: {type: string}, refreshToken: {type: string}, me: {$ref: '#/components/schemas/Me'}}}}}}}}
        default: {$ref: '#/components/responses/Err'}
  /auth/refresh:
    post:
      summary: 刷新令牌 [*]
      security: []
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [refreshToken], properties: {refreshToken: {type: string}}}}}}
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {type: object, required: [accessToken, refreshToken], properties: {accessToken: {type: string}, refreshToken: {type: string}}}}}}}}
        default: {$ref: '#/components/responses/Err'}
  /auth/logout:
    post:
      summary: 退出登录 [*]
      responses:
        '200': {description: ok, content: {application/json: {schema: {$ref: '#/components/schemas/OkVoid'}}}}
        default: {$ref: '#/components/responses/Err'}
  /me:
    get:
      summary: 当前用户与机构设置 [*]
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {$ref: '#/components/schemas/Me'}}}}}}
        default: {$ref: '#/components/responses/Err'}
  /me/password:
    put:
      summary: 修改密码 [*]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [oldPassword, newPassword], properties: {oldPassword: {type: string}, newPassword: {type: string, minLength: 8}}}}}}
      responses:
        '200': {description: ok, content: {application/json: {schema: {$ref: '#/components/schemas/OkVoid'}}}}
        default: {$ref: '#/components/responses/Err'}

  # ================= 管理员 =================
  /admin/teachers:
    get:
      summary: 教师列表 [admin]
      parameters: [{$ref: '#/components/parameters/page'}, {$ref: '#/components/parameters/size'}, {$ref: '#/components/parameters/keyword'}, {name: status, in: query, schema: {$ref: '#/components/schemas/UserStatus'}}]
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {type: object, required: [items, total], properties: {items: {type: array, items: {$ref: '#/components/schemas/Teacher'}}, total: {type: integer}}}}}}}}
        default: {$ref: '#/components/responses/Err'}
    post:
      summary: 创建教师 [admin]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/TeacherInput'}}}}
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {$ref: '#/components/schemas/Teacher'}}}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/teachers/{id}:
    put:
      summary: 编辑教师 [admin]
      parameters: [{$ref: '#/components/parameters/idPath'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/TeacherInput'}}}}
      responses:
        '200': {description: ok, content: {application/json: {schema: {$ref: '#/components/schemas/OkVoid'}}}}
        default: {$ref: '#/components/responses/Err'}
    delete:
      summary: 停用教师(软删) [admin]
      parameters: [{$ref: '#/components/parameters/idPath'}]
      responses:
        '200': {description: ok, content: {application/json: {schema: {$ref: '#/components/schemas/OkVoid'}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/teachers/{id}/reset-password:
    post:
      summary: 重置教师密码 [admin]
      parameters: [{$ref: '#/components/parameters/idPath'}]
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {type: object, required: [password], properties: {password: {type: string}}}}}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/teachers/{id}/enable:
    post:
      summary: 启用教师 [admin]
      parameters: [{$ref: '#/components/parameters/idPath'}]
      responses:
        '200': {description: ok, content: {application/json: {schema: {$ref: '#/components/schemas/OkVoid'}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/students:
    get:
      summary: 学生列表 [admin]
      parameters: [{$ref: '#/components/parameters/page'}, {$ref: '#/components/parameters/size'}, {$ref: '#/components/parameters/keyword'}, {name: status, in: query, schema: {$ref: '#/components/schemas/UserStatus'}}, {name: courseId, in: query, schema: {type: integer}}]
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {type: object, required: [items, total], properties: {items: {type: array, items: {$ref: '#/components/schemas/Student'}}, total: {type: integer}}}}}}}}
        default: {$ref: '#/components/responses/Err'}
    post:
      summary: 创建学生(向家长手机发登录码) [admin]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/StudentInput'}}}}
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {$ref: '#/components/schemas/Student'}}}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/students/{id}:
    put:
      summary: 编辑学生 [admin]
      parameters: [{$ref: '#/components/parameters/idPath'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/StudentInput'}}}}
      responses:
        '200': {description: ok, content: {application/json: {schema: {$ref: '#/components/schemas/OkVoid'}}}}
        default: {$ref: '#/components/responses/Err'}
    delete:
      summary: 停用学生(软删) [admin]
      parameters: [{$ref: '#/components/parameters/idPath'}]
      responses:
        '200': {description: ok, content: {application/json: {schema: {$ref: '#/components/schemas/OkVoid'}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/students/{id}/profile:
    get:
      summary: 学生档案(课程+设备+学情摘要) [admin/teacher]
      parameters: [{$ref: '#/components/parameters/idPath'}]
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {type: object, required: [student, mastery, wrongOpenCount], properties: {student: {$ref: '#/components/schemas/Student'}, mastery: {type: array, items: {$ref: '#/components/schemas/MasteryItem'}}, wrongOpenCount: {type: integer}}}}}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/students/{id}/reset-password:
    post:
      summary: 重置学生密码 [admin]
      parameters: [{$ref: '#/components/parameters/idPath'}]
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {type: object, required: [password], properties: {password: {type: string}}}}}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/students/{id}/enable:
    post:
      summary: 启用学生 [admin]
      parameters: [{$ref: '#/components/parameters/idPath'}]
      responses:
        '200': {description: ok, content: {application/json: {schema: {$ref: '#/components/schemas/OkVoid'}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/courses:
    get:
      summary: 课程列表 [admin]
      parameters: [{$ref: '#/components/parameters/page'}, {$ref: '#/components/parameters/size'}, {$ref: '#/components/parameters/keyword'}, {name: classType, in: query, schema: {$ref: '#/components/schemas/ClassType'}}]
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {type: object, required: [items, total], properties: {items: {type: array, items: {$ref: '#/components/schemas/Course'}}, total: {type: integer}}}}}}}}
        default: {$ref: '#/components/responses/Err'}
    post:
      summary: 创建课程(自动生成 totalLessons 个空讲次) [admin]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/CourseInput'}}}}
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {$ref: '#/components/schemas/Course'}}}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/courses/{id}:
    put:
      summary: 编辑课程 [admin]
      parameters: [{$ref: '#/components/parameters/idPath'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/CourseInput'}}}}
      responses:
        '200': {description: ok, content: {application/json: {schema: {$ref: '#/components/schemas/OkVoid'}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/courses/{id}/roster:
    get:
      summary: 课程名单(到课/作业概览) [admin/teacher]
      parameters: [{$ref: '#/components/parameters/idPath'}]
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {type: array, items: {type: object, required: [studentId, name, attendance, homeworkAvg, status], properties: {studentId: {type: integer}, name: {type: string}, attendance: {type: string}, homeworkAvg: {oneOf: [{type: 'null'}, {type: number}]}, status: {type: string}}}}}}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/courses/{id}/students:
    post:
      summary: 课程添加学生 [admin]
      parameters: [{$ref: '#/components/parameters/idPath'}]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [studentIds], properties: {studentIds: {type: array, items: {type: integer}}}}}}}
      responses:
        '200': {description: ok, content: {application/json: {schema: {$ref: '#/components/schemas/OkVoid'}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/courses/{id}/students/{studentId}:
    delete:
      summary: 课程移除学生 [admin]
      parameters: [{$ref: '#/components/parameters/idPath'}, {name: studentId, in: path, required: true, schema: {type: integer}}]
      responses:
        '200': {description: ok, content: {application/json: {schema: {$ref: '#/components/schemas/OkVoid'}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/dashboard:
    get:
      summary: 管理员总览 [admin]
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {type: object, required: [teacherCount, studentCount, weekAttendanceRate, monthAiCost, todayLessonCount, recentEvents], properties: {teacherCount: {type: integer}, studentCount: {type: integer}, weekAttendanceRate: {oneOf: [{type: 'null'}, {type: number}]}, monthAiCost: {type: number}, todayLessonCount: {type: integer}, recentEvents: {type: array, items: {type: object, required: [text, time], properties: {text: {type: string}, time: {type: string, format: date-time}}}}}}}}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/ai-usage/summary:
    get:
      summary: 本月 AI 用量摘要 [admin]
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {$ref: '#/components/schemas/AiUsageSummary'}}}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/ai-usage/daily:
    get:
      summary: 近 N 日用量曲线 [admin]
      parameters: [{name: days, in: query, schema: {type: integer, default: 14, maximum: 31}}]
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {type: array, items: {type: object, required: [date, tokens, cost], properties: {date: {type: string}, tokens: {type: integer}, cost: {type: number}}}}}}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/ai-usage/breakdown:
    get:
      summary: 按功能拆分(本月) [admin]
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {type: array, items: {$ref: '#/components/schemas/AiUsageBreakdown'}}}}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/ai-quota:
    get:
      summary: 读取额度与告警设置 [admin]
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {type: object, required: [monthlyLimit, alertThreshold, overPolicy], properties: {monthlyLimit: {type: number}, alertThreshold: {type: integer}, overPolicy: {type: string}}}}}}}}
        default: {$ref: '#/components/responses/Err'}
    put:
      summary: 修改额度与告警 [admin]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [monthlyLimit, alertThreshold, overPolicy], properties: {monthlyLimit: {type: number}, alertThreshold: {type: integer, minimum: 50, maximum: 95}, overPolicy: {type: string, enum: [disable_qa, pause_all, record_only]}}}}}}
      responses:
        '200': {description: ok, content: {application/json: {schema: {$ref: '#/components/schemas/OkVoid'}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/ai/config:
    get:
      summary: 读取运行态 LLM 供应商配置(key 脱敏) [admin]
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {$ref: '#/components/schemas/AiProviderConfig'}}}}}}
        default: {$ref: '#/components/responses/Err'}
    put:
      summary: 写入运行态 LLM 供应商配置(apiKey 留空=不覆盖,运行态生效不重启) [admin]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/AiProviderConfigInput'}}}}
      responses:
        '200': {description: ok, content: {application/json: {schema: {$ref: '#/components/schemas/OkVoid'}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/ai/routes:
    get:
      summary: 读取逐功能真假路由 [admin]
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {$ref: '#/components/schemas/AiFeatureRoutes'}}}}}}
        default: {$ref: '#/components/responses/Err'}
    put:
      summary: 设置逐功能真假路由(逐功能切真实↔mock) [admin]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/AiFeatureRoutes'}}}}
      responses:
        '200': {description: ok, content: {application/json: {schema: {$ref: '#/components/schemas/OkVoid'}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/ai/test:
    post:
      summary: 测试 LLM 连接(可选指定功能) [admin]
      requestBody: {content: {application/json: {schema: {type: object, properties: {feature: {type: string}}}}}}
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {$ref: '#/components/schemas/AiTestResult'}}}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/settings:
    get:
      summary: 平台设置 [admin]
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {$ref: '#/components/schemas/Me'}}}}}}
        default: {$ref: '#/components/responses/Err'}
    put:
      summary: 修改设置(引导模式/使用时段/AI 功能开关) [admin]
      requestBody: {required: true, content: {application/json: {schema: {type: object, properties: {qaGuideOnly: {type: boolean}, preGrading: {type: boolean}, classCompanion: {type: boolean}, diagnosis: {type: boolean}, studentHours: {type: object, required: [start, end], properties: {start: {type: string}, end: {type: string}}}}}}}}
      responses:
        '200': {description: ok, content: {application/json: {schema: {$ref: '#/components/schemas/OkVoid'}}}}
        default: {$ref: '#/components/responses/Err'}
  /admin/audit-logs:
    get:
      summary: 审计日志 [admin]
      parameters: [{$ref: '#/components/parameters/page'}, {$ref: '#/components/parameters/size'}]
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {type: object, required: [items, total], properties: {items: {type: array, items: {type: object, required: [actorName, action, createdAt], properties: {actorName: {type: string}, action: {type: string}, targetType: {oneOf: [{type: 'null'}, {type: string}]}, createdAt: {type: string, format: date-time}}}}, total: {type: integer}}}}}}}}
        default: {$ref: '#/components/responses/Err'}

  # ================= 知识图谱(只读) =================
  /kp/graphs:
    get:
      summary: 图谱列表(教材/能力/策略) [teacher/admin]
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {type: array, items: {$ref: '#/components/schemas/KpGraph'}}}}}}}
        default: {$ref: '#/components/responses/Err'}
  /kp/nodes:
    get:
      summary: 节点查询(按图谱/年级/章节/关键词) [teacher/admin]
      parameters: [{name: graphId, in: query, required: true, schema: {type: integer}}, {name: grade, in: query, schema: {type: string}}, {name: chapter, in: query, schema: {type: string}}, {$ref: '#/components/parameters/keyword'}]
      responses:
        '200': {description: ok, content: {application/json: {schema: {type: object, required: [code, message, data], properties: {code: {type: integer}, message: {type: string}, data: {type: array, items: {$ref: '#/components/schemas/KpNode'}}}}}}}
        default: {$ref: '#/components/responses/Err'}
  /knowledge/content-packs:
    get:
      summary: 某图谱下已维护的知识点内容包列表 [teacher]
