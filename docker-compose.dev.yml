# 本地开发依赖:docker compose -f docker-compose.dev.yml up -d
services:
  postgres:
    image: postgres:16
    environment: { POSTGRES_USER: qiming, POSTGRES_PASSWORD: qiming_dev, POSTGRES_DB: qiming_dev }
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
  redis:
    image: redis:7
    ports: ["6379:6379"]
volumes: { pgdata: {} }
