# =============================================================================
# 启明智学 · nginx 配置(D3,随 web 镜像分发,置于 /etc/nginx/conf.d/default.conf)
#
# 默认【端口分端】方案(适合按 IP 访问的校内 LAN):
#   80   学生端    8081 管理端    8082 教师端
# 三个 server 块能力一致:SPA 静态 + history fallback、/api 反代、/socket.io WS 升级、
# /healthz 反代、client_max_body_size 25m(学生拍照直传上限,与后端 25MB 一致)、gzip。
#
# 后端实际路径(读 apps/server 源码确认):
#   /healthz                          全局前缀之外(main.ts exclude)
#   /api/v1/**                        业务 API(全局前缀 api/v1)
#   /api/v1/uploads/local/:token      @Public PUT,本地驱动"预签名直传"(UPLOAD_PUBLIC_BASE 拼出)
#   /api/v1/storage/**?exp&sig        @Public GET,签名回看下载(storage-sign.util 拼出)
#   → 上传/回看全部位于 /api/v1 之下,location /api/ 一并覆盖,无需单独 location。
#   /socket.io/**                     socket.io(命名空间 /classroom 属于 path 内负载,无需另配)
#
# 【有域名时的替代写法】三子域方案(如 stu.example.com / admin.example.com / tea.example.com):
#   1) 三个 server 块都改 listen 80; 并分别设 server_name stu.example.com; 等;
#   2) .env.prod 里 CORS_ORIGINS 改为三个域名来源、UPLOAD_PUBLIC_BASE 改为学生端域名;
#   3) HTTPS(certbot)见 部署手册.md 的 443 注释块。
# =============================================================================

# WebSocket 升级所需的 Connection 头(有 Upgrade 头时 upgrade,否则按普通请求 close)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 后端(compose 内网服务名)
upstream qiming_server {
    server server:3000;
}

# ---- 学生端 :80 ----
server {
    listen 80;
    server_name _;          # 有域名时:listen 80; server_name stu.example.com;

    root  /usr/share/nginx/html/student;
    index index.html;

    # 学生拍照直传 PUT /api/v1/uploads/local/:token,后端单文件上限 25MB
    client_max_body_size 25m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1k;

    # SPA:静态资源直出,其余路径 history fallback 到 index.html
    location / {
        try_files $uri /index.html;
    }

    # 健康检查(后端在全局前缀之外)
    location = /healthz {
        proxy_pass http://qiming_server;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 业务 API + 上传直传(PUT /api/v1/uploads/local/:token)+ 签名回看(GET /api/v1/storage/**)
    location /api/ {
        proxy_pass http://qiming_server;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;           # AI 生成类接口可能较慢
        proxy_request_buffering off;       # 直传大文件不在 nginx 落盘缓冲
    }

    # socket.io(前端 transports 仅 websocket,必须带 Upgrade/Connection 升级头)
    location /socket.io/ {
        proxy_pass http://qiming_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;         # 长连接:超过服务端心跳周期(ping 25s)即可,给足余量
        proxy_send_timeout  3600s;
    }
}

# ---- 管理端 :8081 ----
server {
    listen 8081;
    server_name _;          # 有域名时:listen 80; server_name admin.example.com;

    root  /usr/share/nginx/html/admin;
    index index.html;

    client_max_body_size 25m;   # 管理端题库导入含题图上传

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1k;

    location / {
        try_files $uri /index.html;
    }
    location = /healthz {
        proxy_pass http://qiming_server;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/ {
        proxy_pass http://qiming_server;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }
    location /socket.io/ {
        proxy_pass http://qiming_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}

# ---- 教师端 :8082 ----
server {
    listen 8082;
    server_name _;          # 有域名时:listen 80; server_name tea.example.com;

    root  /usr/share/nginx/html/teacher;
    index index.html;

    client_max_body_size 25m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1k;

    location / {
        try_files $uri /index.html;
    }
    location = /healthz {
        proxy_pass http://qiming_server;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/ {
        proxy_pass http://qiming_server;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }
    # 教师监控页 socket.io(源码 source.ts:真实模式同源连 /classroom 命名空间)
    location /socket.io/ {
        proxy_pass http://qiming_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
