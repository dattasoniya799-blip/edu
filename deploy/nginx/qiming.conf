# =============================================================================
# 鲸云AI教育平台 · nginx 配置(随 web 镜像分发,置于 /etc/nginx/conf.d/default.conf)
#
# 【单端口·路径分端】方案(默认):三端同托管在 80 端口下,用路径区分——
#   学生端  http://<IP>/          (base /)
#   管理端  http://<IP>/admin/     (构建 base=/admin/,路由 basename=/admin)
#   教师端  http://<IP>/teacher/   (构建 base=/teacher/,路由 basename=/teacher)
# 为什么不用 8081/8082 端口分端:国内很多家庭/学校/单位网络会拦截非标准端口(只放行 80/443),
# 老师学生在这些网络下打不开 8081/8082。全部收到 80 端口即可规避。
#
# 后端(同源反代,三端共用):
#   /healthz           健康检查(全局前缀之外)
#   /api/v1/**         业务 API + 上传直传(/api/v1/uploads/local/:token)+ 签名回看(/api/v1/storage/**)
#   /socket.io/**      课堂实时(命名空间 /classroom 属 path 内负载)
# 前端 API 客户端固定用绝对路径 /api/v1、socket.io 用同源 /socket.io,子路径部署不受影响。
#
# 【有域名时】改三子域(stu./admin./tea. 各 listen 80 + server_name)会更干净,base 可回退 '/';
# HTTPS(certbot)见 部署手册.md 的 443 注释块。改域名/HTTPS 后同步 .env.prod 的 CORS_ORIGINS/UPLOAD_PUBLIC_BASE。
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream qiming_server {
    server server:3000;
}

server {
    listen 80;
    server_name _;

    # 供 /admin/ /teacher/ 定位(学生端在 location / 内单独指向 student 子目录)
    root /usr/share/nginx/html;

    client_max_body_size 25m;      # 学生拍照直传 / 管理端题图上传上限,与后端 25MB 一致
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1k;

    # ---- 管理端 /admin/ ----
    location = /admin  { return 301 /admin/; }
    location /admin/ {
        try_files $uri /admin/index.html;     # → /usr/share/nginx/html/admin/**,history fallback
    }

    # ---- 教师端 /teacher/ ----
    location = /teacher { return 301 /teacher/; }
    location /teacher/ {
        try_files $uri /teacher/index.html;
    }

    # ---- 后端反代(三端共用,同源)----
    location = /healthz {
        proxy_pass http://qiming_server;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/ {
        proxy_pass http://qiming_server;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;           # AI 生成类接口可能较慢
        proxy_request_buffering off;       # 直传大文件不在 nginx 落盘缓冲
    }
    location /socket.io/ {
        proxy_pass http://qiming_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;         # 长连接:超过服务端心跳(ping 25s)即可,给足余量
        proxy_send_timeout  3600s;
    }

    # ---- 学生端 /(根路径,兜底)----
    location / {
        root /usr/share/nginx/html/student;
        try_files $uri /index.html;
    }
}
